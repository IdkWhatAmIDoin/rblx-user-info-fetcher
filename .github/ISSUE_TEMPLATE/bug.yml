name: Bug Report
description: send a bug report for me to fix it
title: "[BUG]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: what happened
      description: what did you see?
      placeholder: describe the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: what did you expect to happen
      placeholder: what should have happened instead
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: how to reproduce
      description: how do i reproduce this issue bro 😼
      placeholder: how do i do it bro tell me
    validations:
      required: true

  - type: textarea
    id: request-body
    attributes:
      label: request body
      description: paste the json you sent (remove any sensitive stuff)
      placeholder: '{"username": "..."}'
    validations:
      required: true

  - type: textarea
    id: response
    attributes:
      label: response you got
      description: status code + response body if you have it
      placeholder: "404: {\"error\": \"...\"}"
    validations:
      required: true

  - type: dropdown
    id: client
    attributes:
      label: how were you calling the api
      options:
        - curl / httpie
        - javascript fetch
        - python requests
        - the website
        - other
    validations:
      required: true
